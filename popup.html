<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Visual Hashing</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="4" width="5" height="16" rx="2" fill="#FF6B6B"/>
            <rect x="7" y="4" width="5" height="16" rx="2" fill="#4ECDC4"/>
            <rect x="13" y="4" width="5" height="16" rx="2" fill="#45B7D1"/>
            <rect x="19" y="4" width="4" height="16" rx="2" fill="#96CEB4"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Visual Hashing</h1>
          <span class="version">v2.0</span>
        </div>
      </div>
      <label class="toggle-switch" id="master-toggle-label">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Preview -->
    <div class="preview-section">
      <label class="section-label">预览 / Preview</label>
      <div class="preview-bar" id="preview-bar">
        <div class="preview-band" style="background:#FF6B6B"></div>
        <div class="preview-band" style="background:#4ECDC4"></div>
        <div class="preview-band" style="background:#45B7D1"></div>
        <div class="preview-band" style="background:#96CEB4"></div>
      </div>
      <div class="preview-input-wrapper">
        <svg class="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="preview-input" placeholder="在此测试密码可视化效果…" autocomplete="off">
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-section">
      <!-- Color Bars -->
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">色条数量</span>
          <span class="setting-desc">显示的颜色条数量</span>
        </div>
        <div class="bar-selector" id="bar-selector">
          <button class="bar-btn" data-value="3">3</button>
          <button class="bar-btn active" data-value="4">4</button>
          <button class="bar-btn" data-value="5">5</button>
          <button class="bar-btn" data-value="6">6</button>
        </div>
      </div>

      <!-- Personal Salt -->
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">个人盐值</span>
          <span class="setting-desc">添加私密前缀，使哈希独一无二</span>
        </div>
      </div>
      <div class="salt-input-wrapper">
        <input type="text" id="salt-input" placeholder="可选: 输入你的个人盐值…" spellcheck="false" autocomplete="off">
        <button class="salt-clear-btn" id="salt-clear" title="清除">&times;</button>
      </div>

      <!-- Randomize -->
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">视觉噪点</span>
          <span class="setting-desc">为颜色添加微小随机变化</span>
        </div>
        <label class="toggle-switch small">
          <input type="checkbox" id="toggle-randomize" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">基于 Mozilla Visual Hashing 重构</span>
      <span class="footer-sep">·</span>
      <span class="footer-text">SHA-256</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
